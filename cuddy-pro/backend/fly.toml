app = "cuddy-pro-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  OPENAI_MODEL = "gpt-4.1-mini"
  FRONTEND_ORIGINS = "https://cuddy.uz,https://admin.cuddy.uz"
  CUDDY_DATA_DIR = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[mounts]]
  source = "cuddy_data"
  destination = "/data"
